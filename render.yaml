services:
  - type: web
    name: yt-vault-api
    runtime: python
    buildCommand: pip install -r backend/requirements.txt && apt-get install -y ffmpeg || true
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: downloads
      mountPath: /tmp/downloads
      sizeGB: 1
